<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Energy Monitor{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%233b82f6'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --secondary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --border-light: #475569;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* Navigation */
        nav { 
            background: var(--bg-darker);
            backdrop-filter: blur(20px);
            padding: 1rem 0;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        
        nav .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        nav .logo { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.02em;
        }
        
        nav .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }
        
        nav ul { 
            list-style: none; 
            display: flex; 
            gap: 0.5rem; 
            align-items: center;
        }
        
        nav a { 
            color: var(--text-secondary); 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            position: relative;
        }
        
        nav a:hover { 
            background: var(--bg-card);
            color: var(--primary-light);
            transform: translateY(-2px);
        }
        
        /* Container */
        .container { 
            max-width: 1400px; 
            margin: 2rem auto; 
            padding: 0 2rem; 
        }
        
        /* Cards */
        .card { 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 2.5rem; 
            margin-bottom: 2rem; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: var(--border-light);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Typography */
        h1 { 
            color: var(--text-primary); 
            margin-bottom: 1rem;
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        
        h2 { 
            color: var(--text-primary); 
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        
        h3 {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        p {
            color: var(--text-secondary);
        }
        
        .text-muted {
            color: var(--text-muted) !important;
        }
        
        /* Buttons */
        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 0.875rem 1.75rem; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover { 
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-success {
            background: var(--success);
        }
        
        .btn-success:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        
        .btn-danger {
            background: var(--danger);
        }
        
        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--border-light);
        }
        
        /* Form Elements */
        input, select { 
            padding: 0.875rem 1rem; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 0.95rem; 
            width: 100%; 
            margin-bottom: 1rem;
            transition: all 0.2s ease;
            font-family: inherit;
            background: var(--bg-darker);
            color: var(--text-primary);
        }
        
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        /* Alerts */
        .alert { 
            padding: 1rem 1.25rem; 
            border-radius: 8px; 
            margin-bottom: 1rem;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .alert-success { 
            background: rgba(16, 185, 129, 0.1); 
            color: #6ee7b7; 
            border-color: var(--success); 
        }
        
        .alert-warning { 
            background: rgba(245, 158, 11, 0.1); 
            color: #fbbf24; 
            border-color: var(--warning); 
        }
        
        .alert-danger { 
            background: rgba(239, 68, 68, 0.1); 
            color: #fca5a5; 
            border-color: var(--danger); 
        }
        
        /* Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 1.5rem; 
        }
        
        /* Stat Cards */
        .stat-card { 
            background: var(--bg-card); 
            color: var(--text-primary); 
            padding: 1.75rem; 
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            border-color: var(--border-light);
        }
        
        .stat-card h3 { 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--primary-light);
        }
        
        .stat-card p { 
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        /* Badge */
        .badge {
            display: inline-block;
            padding: 0.4rem 0.875rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary-light);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.3);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        /* Loading */
        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-secondary);
        }
        
        th {
            background: var(--bg-darker);
            color: var(--text-primary);
            font-weight: 600;
            text-align: left;
            padding: 0.875rem;
            border-bottom: 1px solid var(--border);
        }
        
        td {
            padding: 0.875rem;
            border-bottom: 1px solid var(--border);
        }
        
        tr:hover {
            background: var(--bg-darker);
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
        
        /* Tooltip */
        .tooltip {
            position: relative;
            display: inline-block;
        }
        
        .tooltip .tooltiptext {
            visibility: hidden;
            background-color: var(--bg-card);
            color: var(--text-primary);
            text-align: center;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.875rem;
            white-space: nowrap;
            border: 1px solid var(--border);
        }
        
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
        
        /* Modal */
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        
        .modal-header {
            border-bottom: 1px solid var(--border);
        }
        
        .modal-footer {
            border-top: 1px solid var(--border);
        }
        
        .btn-close {
            filter: invert(1);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            
            nav .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .card {
                padding: 1.5rem;
            }
            
            .stat-card h3 {
                font-size: 2rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">EM</div>
                <span>Energy Monitor AI</span>
            </div>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/analytics">Analytics</a></li>
                <li><a href="/iot">IoT Devices</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script>
        // Add smooth animations on page load
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });
        });
        
        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
