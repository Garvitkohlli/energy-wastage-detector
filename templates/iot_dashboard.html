{% extends "base.html" %}

{% block title %}IoT Dashboard{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-12">
            <h2>IoT Device Dashboard</h2>
            <p class="text-muted">Monitor and control connected IoT devices in real-time</p>
        </div>
    </div>

    <!-- Add Device Button -->
    <div class="row mb-3">
        <div class="col-md-12">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDeviceModal">
                Add New Device
            </button>
            <button class="btn btn-secondary" onclick="refreshDevices()">
                Refresh
            </button>
        </div>
    </div>

    <!-- Device Cards -->
    <div class="row" id="deviceCards">
        <!-- Devices will be loaded here -->
    </div>

    <!-- Device Details Modal -->
    <div class="modal fade" id="deviceModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deviceModalTitle">Device Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="deviceModalBody">
                    <!-- Device details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Device Modal -->
    <div class="modal fade" id="addDeviceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New IoT Device</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addDeviceForm">
                        <div class="mb-3">
                            <label class="form-label">Device ID</label>
                            <input type="text" class="form-control" id="deviceId" required>
                            <small class="text-muted">Unique identifier (e.g., ESP32_001)</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Device Name</label>
                            <input type="text" class="form-control" id="deviceName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Device Type</label>
                            <select class="form-control" id="deviceType" required>
                                <option value="ESP32">ESP32</option>
                                <option value="ESP8266">ESP8266</option>
                                <option value="Arduino">Arduino</option>
                                <option value="Smart Plug">Smart Plug</option>
                                <option value="Sensor">Sensor</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">IP Address (Optional)</label>
                            <input type="text" class="form-control" id="ipAddress">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">MAC Address (Optional)</label>
                            <input type="text" class="form-control" id="macAddress">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addDevice()">Add Device</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.device-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    transition: all 0.3s;
    background: var(--bg-card);
    color: var(--text-primary);
}

.device-card:hover {
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transform: translateY(-2px);
}

.device-card.online {
    border-left: 4px solid #28a745;
}

.device-card.offline {
    border-left: 4px solid #dc3545;
}

.device-card h5 {
    color: var(--text-primary);
}

.device-card .text-muted {
    color: var(--text-muted) !important;
}

.device-status {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
}

.status-online {
    background-color: rgba(16, 185, 129, 0.15);
    color: #6ee7b7;
    border: 1px solid rgba(16, 185, 129, 0.3);
}

.status-offline {
    background-color: rgba(239, 68, 68, 0.15);
    color: #fca5a5;
    border: 1px solid rgba(239, 68, 68, 0.3);
}

.power-display {
    font-size: 32px;
    font-weight: bold;
    color: var(--primary-light);
}

.device-icon {
    font-size: 48px;
    margin-bottom: 10px;
}

.control-btn {
    margin: 5px;
}

.chart-container {
    height: 200px;
    margin-top: 15px;
}
</style>

<script>
let deviceCharts = {};

// Load devices on page load
$(document).ready(function() {
    loadDevices();
    setInterval(loadDevices, 3000); // Refresh every 3 seconds
});

function loadDevices() {
    $.get('/api/iot/devices', function(data) {
        displayDevices(data.devices);
    });
}

function displayDevices(devices) {
    const container = $('#deviceCards');
    
    if (devices.length === 0) {
        container.html(`
            <div class="col-md-12 text-center py-5">
                <div style="font-size: 64px; color: #666;">◉</div>
                <h4 class="mt-3">No IoT Devices Connected</h4>
                <p class="text-muted">Add your first device to get started</p>
            </div>
        `);
        return;
    }
    
    container.empty();
    
    devices.forEach(device => {
        const statusClass = device.status === 'online' ? 'online' : 'offline';
        const statusBadge = device.status === 'online' ? 'status-online' : 'status-offline';
        const powerState = device.power_state === 'on' ? 'ON' : 'OFF';
        const powerStateClass = device.power_state === 'on' ? 'success' : 'secondary';
        
        const icon = getDeviceIcon(device.device_type);
        
        const card = `
            <div class="col-md-4">
                <div class="device-card ${statusClass}">
                    <div class="text-center device-icon">${icon}</div>
                    <h5 class="text-center">${device.device_name}</h5>
                    <p class="text-center text-muted">${device.device_type}</p>
                    
                    <div class="text-center mb-3">
                        <span class="device-status ${statusBadge}">${device.status.toUpperCase()}</span>
                        <span class="device-status ms-2 bg-${powerStateClass} text-white">${powerState}</span>
                    </div>
                    
                    <div class="text-center mb-3">
                        <div class="power-display">${device.current_power.toFixed(1)} W</div>
                        <small class="text-muted">Current Power</small>
                    </div>
                    
                    <div class="row text-center mb-3">
                        <div class="col-6">
                            <strong>${device.total_energy ? device.total_energy.toFixed(2) : '0.00'}</strong>
                            <br><small class="text-muted">kWh Total</small>
                        </div>
                        <div class="col-6">
                            <strong>${device.last_seen ? new Date(device.last_seen).toLocaleTimeString() : 'Never'}</strong>
                            <br><small class="text-muted">Last Seen</small>
                        </div>
                    </div>
                    
                    <div class="text-center">
                        <button class="btn btn-sm btn-success control-btn" onclick="controlDevice('${device.device_id}', 'on')">
                            ON
                        </button>
                        <button class="btn btn-sm btn-danger control-btn" onclick="controlDevice('${device.device_id}', 'off')">
                            OFF
                        </button>
                        <button class="btn btn-sm btn-info control-btn" onclick="viewDevice('${device.device_id}')">
                            Details
                        </button>
                        <button class="btn btn-sm btn-warning control-btn" onclick="deleteDevice('${device.device_id}')">
                            Delete
                        </button>
                    </div>
                    
                    <div class="chart-container">
                        <canvas id="chart_${device.device_id.replace(/[^a-zA-Z0-9]/g, '_')}"></canvas>
                    </div>
                </div>
            </div>
        `;
        
        container.append(card);
        
        // Load chart data
        loadDeviceChart(device.device_id);
    });
}

function getDeviceIcon(deviceType) {
    const icons = {
        'ESP32': '◉',
        'ESP8266': '◉',
        'Arduino': '▣',
        'Smart Plug': '▣',
        'Sensor': '▤',
        'Other': '◈'
    };
    return icons[deviceType] || '◈';
}

function loadDeviceChart(deviceId) {
    $.get(`/api/iot/device/${deviceId}/readings?limit=20`, function(data) {
        const chartId = `chart_${deviceId.replace(/[^a-zA-Z0-9]/g, '_')}`;
        const ctx = document.getElementById(chartId);
        
        if (!ctx) return;
        
        // Destroy existing chart
        if (deviceCharts[deviceId]) {
            deviceCharts[deviceId].destroy();
        }
        
        const readings = data.readings.reverse();
        const labels = readings.map(r => new Date(r.timestamp).toLocaleTimeString());
        const powers = readings.map(r => r.power);
        
        deviceCharts[deviceId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Power (W)',
                    data: powers,
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0, 123, 255, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    });
}

function addDevice() {
    const deviceData = {
        device_id: $('#deviceId').val(),
        device_name: $('#deviceName').val(),
        device_type: $('#deviceType').val(),
        ip_address: $('#ipAddress').val(),
        mac_address: $('#macAddress').val()
    };
    
    $.post('/api/iot/device/register', deviceData, function(response) {
        if (response.success) {
            $('#addDeviceModal').modal('hide');
            $('#addDeviceForm')[0].reset();
            loadDevices();
            alert('Device added successfully!');
        } else {
            alert('Error: ' + response.message);
        }
    });
}

function controlDevice(deviceId, command) {
    $.post(`/api/iot/device/${deviceId}/control`, {
        command: command
    }, function(response) {
        if (response.success) {
            loadDevices();
        } else {
            alert('Error: ' + response.message);
        }
    });
}

function viewDevice(deviceId) {
    $.get(`/api/iot/device/${deviceId}`, function(data) {
        const device = data.device;
        const html = `
            <div class="row">
                <div class="col-md-6">
                    <h6>Device Information</h6>
                    <table class="table table-sm">
                        <tr><td><strong>Device ID:</strong></td><td>${device.device_id}</td></tr>
                        <tr><td><strong>Name:</strong></td><td>${device.device_name}</td></tr>
                        <tr><td><strong>Type:</strong></td><td>${device.device_type}</td></tr>
                        <tr><td><strong>Status:</strong></td><td>${device.status}</td></tr>
                        <tr><td><strong>Power State:</strong></td><td>${device.power_state}</td></tr>
                        <tr><td><strong>IP Address:</strong></td><td>${device.ip_address || 'N/A'}</td></tr>
                        <tr><td><strong>MAC Address:</strong></td><td>${device.mac_address || 'N/A'}</td></tr>
                        <tr><td><strong>Firmware:</strong></td><td>${device.firmware_version || 'N/A'}</td></tr>
                    </table>
                </div>
                <div class="col-md-6">
                    <h6>Current Readings</h6>
                    <table class="table table-sm">
                        <tr><td><strong>Power:</strong></td><td>${device.current_power.toFixed(2)} W</td></tr>
                        <tr><td><strong>Total Energy:</strong></td><td>${device.total_energy ? device.total_energy.toFixed(2) : '0.00'} kWh</td></tr>
                        <tr><td><strong>Last Seen:</strong></td><td>${device.last_seen ? new Date(device.last_seen).toLocaleString() : 'Never'}</td></tr>
                        <tr><td><strong>Created:</strong></td><td>${new Date(device.created_at).toLocaleString()}</td></tr>
                    </table>
                </div>
            </div>
        `;
        
        $('#deviceModalTitle').text(device.device_name);
        $('#deviceModalBody').html(html);
        $('#deviceModal').modal('show');
    });
}

function deleteDevice(deviceId) {
    if (confirm('Are you sure you want to delete this device?')) {
        $.ajax({
            url: `/api/iot/device/${deviceId}`,
            type: 'DELETE',
            success: function(response) {
                if (response.success) {
                    loadDevices();
                    alert('Device deleted successfully!');
                } else {
                    alert('Error: ' + response.message);
                }
            }
        });
    }
}

function refreshDevices() {
    loadDevices();
}
</script>
{% endblock %}
